<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conektar — Acceso</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #c8a96e;
      --text: #e8e4dc;
      --muted: #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Fondo con textura sutil */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(200,169,110,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(200,169,110,0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo-title {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px;
    }

    .card h2 {
      font-size: 16px;
      font-weight: 400;
      color: var(--muted);
      margin-bottom: 28px;
      letter-spacing: 0.05em;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: var(--accent);
    }

    .btn {
      width: 100%;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      background: rgba(220, 80, 80, 0.1);
      border: 1px solid rgba(220, 80, 80, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #e07070;
      margin-top: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-title">Conektar</div>
      <div class="logo-sub">Sistema de automatización</div>
    </div>

    <div class="card">
      <h2>Iniciar sesión</h2>

      <div class="field">
        <label>Usuario</label>
        <input type="text" id="username" placeholder="usuario" autocomplete="username">
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn" id="btnLogin">Ingresar</button>
      <div class="error" id="error">Usuario o contraseña incorrectos</div>
    </div>
  </div>

  <script>
    const btn = document.getElementById('btnLogin');
    const errorEl = document.getElementById('error');

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) return;

      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.ok) {
          window.location.href = '/app';
        } else {
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Ingresar';
        }
      } catch {
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    }

    btn.addEventListener('click', login);
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
